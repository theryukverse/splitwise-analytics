{% extends "base.html" %}
{% block title %}Category Breakdown — Splitwise Analytics{% endblock %}

{% block content %}
<div class="page-header animate-in">
    <h1>Category Breakdown</h1>
    <p>See where your money goes — by category.</p>
</div>

<div class="chart-grid">
    <div class="card animate-in">
        <div class="card-header">
            <h3>Spending by Category</h3>
            <select id="catRange" class="form-select" onchange="loadCategories()">
                <option value="3">Last 3 months</option>
                <option value="6">Last 6 months</option>
                <option value="12" selected>Last 12 months</option>
            </select>
        </div>
        <div class="chart-container" style="max-width:400px;margin:0 auto;">
            <canvas id="catChart"></canvas>
        </div>
    </div>
    <div class="card animate-in">
        <div class="card-header">
            <h3>Details</h3>
        </div>
        <div style="overflow-x:auto;">
            <table class="data-table" id="catTable">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Share</th>
                    </tr>
                </thead>
                <tbody id="catBody"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let catChartInstance = null;

    async function loadCategories() {
        const months = document.getElementById('catRange').value;
        const res = await fetch('/api/category-breakdown?months=' + months);
        const d = await res.json();
        const total = d.values.reduce((s, v) => s + v, 0);

        if (catChartInstance) catChartInstance.destroy();
        catChartInstance = new Chart(document.getElementById('catChart'), {
            type: 'doughnut',
            data: {
                labels: d.labels,
                datasets: [{
                    data: d.values,
                    backgroundColor: CHART_COLORS.slice(0, d.labels.length),
                    borderWidth: 0,
                    hoverOffset: 10,
                }],
            },
            options: {
                responsive: true,
                cutout: '60%',
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } },
                    tooltip: { callbacks: { label: ctx => ctx.label + ': ' + d.currency + ' ' + ctx.parsed.toLocaleString() } },
                },
            },
        });

        // Table
        const body = document.getElementById('catBody');
        body.innerHTML = d.labels.map((label, i) => {
            const pct = total > 0 ? ((d.values[i] / total) * 100).toFixed(1) : '0.0';
            return '<tr>' +
                '<td><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:' + CHART_COLORS[i % CHART_COLORS.length] + ';margin-right:10px;"></span>' + label + '</td>' +
                '<td>' + d.currency + ' ' + d.values[i].toLocaleString() + '</td>' +
                '<td>' + pct + '%</td>' +
                '</tr>';
        }).join('');
    }

    loadCategories();
</script>
{% endblock %}
