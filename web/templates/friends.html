{% extends "base.html" %}
{% block title %}Friends — Splitwise Analytics{% endblock %}

{% block content %}
<div class="page-header animate-in">
    <h1>Friends</h1>
    <p>Your Splitwise friends and current balances.</p>
</div>

<div id="friendsContainer">
    <div class="spinner-wrap">
        <div class="spinner"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    (async () => {
        const res = await fetch('/api/friends');
        const friends = await res.json();
        const container = document.getElementById('friendsContainer');

        if (!friends.length) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">🤝</div><p>No friends found.</p></div>';
            return;
        }

        container.innerHTML = '<div class="list-grid">' + friends.map(f => {
            let balanceHtml = '<span class="balance-zero">settled up</span>';
            if (f.balances.length) {
                balanceHtml = f.balances.map(b => {
                    const cls = b.amount > 0 ? 'balance-positive' : b.amount < 0 ? 'balance-negative' : 'balance-zero';
                    const label = b.amount > 0 ? 'owes you' : 'you owe';
                    if (b.amount === 0) return '<span class="balance-zero">settled up</span>';
                    return '<div class="' + cls + '">' +
                        '<div style="font-size:0.75rem;color:var(--text-muted);">' + label + '</div>' +
                        b.currency + ' ' + Math.abs(b.amount).toLocaleString() +
                        '</div>';
                }).join('');
            }

            return '<div class="list-item animate-in">' +
                (f.avatar ? '<img src="' + f.avatar + '" class="item-avatar" alt="">' :
                    '<div class="item-avatar-placeholder">' + f.name[0] + '</div>') +
                '<div class="item-info">' +
                '<div class="item-name">' + f.name + '</div>' +
                '</div>' +
                '<div class="item-balance">' + balanceHtml + '</div>' +
                '</div>';
        }).join('') + '</div>';
    })();
</script>
{% endblock %}
